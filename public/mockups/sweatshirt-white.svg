<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e1dc"/>
    </linearGradient>
    <linearGradient id="shadowWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2ec"/>
      <stop offset="100%" stop-color="#d2cbc3"/>
    </linearGradient>
    <radialGradient id="highlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 470) rotate(90) scale(440 560)">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="fabric" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="1" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#b9b2a8" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="none"/>

  <g filter="url(#dropShadow)">
    <path d="M260 270L420 170H780L940 270L860 410V980C860 1050 815 1085 745 1085H455C385 1085 340 1050 340 980V410L260 270Z" fill="url(#bodyWhite)" stroke="#d3ccc3" stroke-width="8"/>
    <path d="M420 170L480 290H720L780 170" fill="url(#shadowWhite)"/>
    <path d="M260 270L180 430L330 540L340 410" fill="url(#shadowWhite)" stroke="#d3ccc3" stroke-width="7"/>
    <path d="M940 270L1020 430L870 540L860 410" fill="url(#shadowWhite)" stroke="#d3ccc3" stroke-width="7"/>
    <rect x="470" y="1010" width="260" height="40" rx="16" fill="#d9d3cb"/>
    <path d="M480 300C480 360 525 405 600 405C675 405 720 360 720 300" stroke="#c9c1b6" stroke-width="14"/>
    <path d="M430 580C520 630 680 630 770 580" stroke="#d4cec6" stroke-width="12" opacity="0.7"/>
    <rect x="360" y="300" width="480" height="720" fill="url(#highlight)"/>
