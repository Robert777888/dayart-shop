<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9e6e1"/>
    </linearGradient>
    <linearGradient id="shadowWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ef"/>
      <stop offset="100%" stop-color="#d7d2cc"/>
    </linearGradient>
    <radialGradient id="highlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 460) rotate(90) scale(420 520)">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="fabric" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="1" seed="3" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#b9b2a8" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="none"/>

  <g filter="url(#dropShadow)">
    <path d="M300 260L430 170H770L900 260L820 380V970C820 1030 780 1065 720 1065H480C420 1065 380 1030 380 970V380L300 260Z" fill="url(#bodyWhite)" stroke="#d7d1c8" stroke-width="8"/>
    <path d="M430 170L480 260H720L770 170" fill="url(#shadowWhite)"/>
    <path d="M300 260L210 390L340 475L380 380" fill="url(#shadowWhite)" stroke="#d7d1c8" stroke-width="7"/>
    <path d="M900 260L990 390L860 475L820 380" fill="url(#shadowWhite)" stroke="#d7d1c8" stroke-width="7"/>
    <path d="M480 260C480 320 525 365 600 365C675 365 720 320 720 260" stroke="#cfc8be" stroke-width="14"/>
    <path d="M430 260C430 310 465 350 520 350" stroke="#dfd8cf" stroke-width="10"/>
    <path d="M770 260C770 310 735 350 680 350" stroke="#dfd8cf" stroke-width="10"/>
    <path d="M430 560C520 600 680 600 770 560" stroke="#dcd5cc" stroke-width="12" opacity="0.7"/>
    <rect x="380" y="260" width="440" height="720" fill="url(#highlight)"/>
    <rect x="360" y="260" width="480" height="720" filter="url(#fabric)" opacity="0.7"/>
  </g>
